<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Complaints — Society Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="assets/css/app.css" rel="stylesheet"/>
</head>
<body>
<div class="sm-app">
  <aside id="sm-sidebar" class="sm-sidebar"></aside>
  <main class="sm-main">
    <div id="sm-topbar" class="sm-topbar"></div>

    <div class="d-flex justify-content-between mb-3">
      <div>
        <ul class="nav nav-pills" id="cTabs">
          <li class="nav-item"><a class="nav-link active" data-tab="mine">My Complaints</a></li>
          <li class="nav-item d-none" id="tabAll"><a class="nav-link" data-tab="all">All Complaints</a></li>
        </ul>
      </div>
      <button class="btn btn-primary btn-sm" id="btnNew"><i class="bi bi-plus-lg me-1"></i> Raise Complaint</button>
    </div>

    <div class="card">
      <div class="table-responsive">
        <table class="table align-middle mb-0">
          <thead><tr>
            <th>Ticket</th><th>Subject</th><th>Category</th><th>Priority</th><th>Status</th><th>Raised</th><th class="text-end">Action</th>
          </tr></thead>
          <tbody id="tbody"><tr><td colspan="7" class="text-muted text-center py-4">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- New complaint modal -->
<div class="modal fade" id="newModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="newForm">
        <div class="modal-header"><h5 class="modal-title">New Complaint</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div class="mb-2"><label class="form-label small">Subject</label><input name="subject" class="form-control" required/></div>
          <div class="row g-2">
            <div class="col-md-6"><label class="form-label small">Category</label>
              <select name="category" class="form-select">
                <option>PLUMBING</option><option>ELECTRICAL</option><option>SECURITY</option>
                <option>HOUSEKEEPING</option><option>LIFT</option><option>OTHER</option>
              </select></div>
            <div class="col-md-6"><label class="form-label small">Priority</label>
              <select name="priority" class="form-select">
                <option>LOW</option><option selected>MEDIUM</option><option>HIGH</option><option>URGENT</option>
              </select></div>
          </div>
          <div class="mb-2 mt-2"><label class="form-label small">Description</label><textarea name="description" class="form-control" rows="4"></textarea></div>
        </div>
        <div class="modal-footer"><button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary">Submit</button></div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/app.js"></script>
<script>
Auth.requireLogin();
renderLayout('complaints', 'Complaints');

const isAdmin = Auth.hasRole('SUPER_ADMIN','SOCIETY_ADMIN','COMMITTEE');
if (isAdmin) document.getElementById('tabAll').classList.remove('d-none');
let currentTab = 'mine';

document.querySelectorAll('#cTabs a').forEach(a => a.addEventListener('click', e => {
  e.preventDefault();
  document.querySelectorAll('#cTabs a').forEach(x => x.classList.remove('active'));
  a.classList.add('active');
  currentTab = a.dataset.tab; load();
}));

async function load() {
  showSpinner(true);
  try {
    const page = currentTab === 'mine' ? await API.myComplaints() : await API.complaints();
    const rows = page.content || page;
    const tbody = document.getElementById('tbody');
    if (!rows.length) { tbody.innerHTML = '<tr><td colspan="7" class="text-muted text-center py-3">No complaints.</td></tr>'; return; }
    tbody.innerHTML = rows.map(c => `
      <tr>
        <td><code>${c.ticketNumber}</code></td>
        <td>${escapeHtml(c.subject)}</td>
        <td><span class="badge bg-secondary-subtle text-secondary">${c.category || '-'}</span></td>
        <td><span class="badge bg-${priorityColor(c.priority)}-subtle text-${priorityColor(c.priority)}">${c.priority}</span></td>
        <td><span class="badge-status ${c.status.toLowerCase()}">${c.status.replace('_',' ')}</span></td>
        <td class="small text-muted">${fmt.date(c.createdAt)}</td>
        <td class="text-end">
          ${isAdmin && c.status !== 'CLOSED' ? `
            <select class="form-select form-select-sm d-inline-block w-auto" onchange="setStatus(${c.id}, this.value)">
              <option ${c.status==='OPEN'?'selected':''} value="OPEN">Open</option>
              <option ${c.status==='IN_PROGRESS'?'selected':''} value="IN_PROGRESS">In Progress</option>
              <option ${c.status==='RESOLVED'?'selected':''} value="RESOLVED">Resolved</option>
              <option ${c.status==='CLOSED'?'selected':''} value="CLOSED">Close</option>
            </select>` : ''}
        </td>
      </tr>`).join('');
  } catch (e) { showToast(e.message, 'danger'); }
  finally { showSpinner(false); }
}

function priorityColor(p){ return {LOW:'secondary',MEDIUM:'primary',HIGH:'warning',URGENT:'danger'}[p] || 'secondary'; }

async function setStatus(id, status) {
  try {
    await API.updateComplaint(id, { status });
    showToast('Updated', 'success'); load();
  } catch (e) { showToast(e.message, 'danger'); }
}
window.setStatus = setStatus;

document.getElementById('btnNew').addEventListener('click', () => new bootstrap.Modal(document.getElementById('newModal')).show());
document.getElementById('newForm').addEventListener('submit', async e => {
  e.preventDefault();
  const fd = Object.fromEntries(new FormData(e.currentTarget));
  showSpinner(true);
  try {
    await API.createComplaint(fd);
    bootstrap.Modal.getInstance(document.getElementById('newModal')).hide();
    showToast('Complaint raised', 'success');
    e.currentTarget.reset(); load();
  } catch (err) { showToast(err.message, 'danger'); }
  finally { showSpinner(false); }
});

function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
load();
</script>
</body>
</html>
