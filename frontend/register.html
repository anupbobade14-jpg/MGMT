<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Register — Society Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="assets/css/app.css" rel="stylesheet"/>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card" style="max-width:520px">
      <div class="brand-lg">
        <i class="bi bi-person-plus-fill"></i>
        <h2>Create Owner Account</h2>
        <p>Register to access the resident portal</p>
      </div>

      <div id="alert" class="alert alert-danger d-none py-2 small mb-3"></div>

      <form id="regForm">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label small">Full name</label>
            <input name="fullName" class="form-control" required/>
          </div>
          <div class="col-md-6">
            <label class="form-label small">Phone</label>
            <input name="phone" class="form-control"/>
          </div>
          <div class="col-md-6">
            <label class="form-label small">Email</label>
            <input type="email" name="email" class="form-control" required/>
          </div>
          <div class="col-md-6">
            <label class="form-label small">Password (min 6)</label>
            <input type="password" name="password" class="form-control" required minlength="6"/>
          </div>
          <div class="col-md-6">
            <label class="form-label small">Role</label>
            <select name="role" class="form-select" required>
              <option value="OWNER">Owner</option>
              <option value="TENANT">Tenant</option>
              <option value="SECURITY">Security</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label small">Flat (optional)</label>
            <select name="flatId" class="form-select"><option value="">— Select later —</option></select>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 mt-4" id="submitBtn">
          <i class="bi bi-check2-circle me-1"></i> Register
        </button>
      </form>
      <div class="text-center small text-muted mt-3">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    (async () => {
      try {
        const b = await API.buildings();
        const flatSel = document.querySelector('select[name=flatId]');
        for (const bld of b) {
          const flats = await API.flatsOf(bld.id);
          const grp = document.createElement('optgroup');
          grp.label = `${bld.name} - Wing ${bld.wing || ''}`;
          for (const f of flats) {
            const o = document.createElement('option');
            o.value = f.id;
            o.textContent = f.flatNumber + (f.bhk ? ` (${f.bhk})` : '');
            grp.appendChild(o);
          }
          flatSel.appendChild(grp);
        }
      } catch (e) { /* backend may be down, ignore */ }
    })();

    document.getElementById('regForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const alert = document.getElementById('alert');
      alert.classList.add('d-none');
      btn.disabled = true;
      const fd = new FormData(e.currentTarget);
      const payload = Object.fromEntries(fd);
      if (payload.flatId === '') delete payload.flatId;
      else payload.flatId = Number(payload.flatId);
      try {
        const res = await API.register(payload);
        Auth.save(res);
        window.location.href = 'dashboard.html';
      } catch (err) {
        alert.textContent = err.message || 'Registration failed';
        alert.classList.remove('d-none');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
