<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sign in — Society Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="assets/css/app.css" rel="stylesheet"/>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand-lg">
        <i class="bi bi-building-fill-check"></i>
        <h2>Society Management</h2>
        <p>Sign in to your account</p>
      </div>

      <div id="alert" class="alert alert-danger d-none py-2 small mb-3"></div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label class="form-label small text-muted">Email</label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="bi bi-envelope"></i></span>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus/>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label small text-muted">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
            <button type="button" class="btn btn-outline-secondary" onclick="togglePw()"><i id="pwEye" class="bi bi-eye"></i></button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2" id="submitBtn">
          <span id="btnText"><i class="bi bi-box-arrow-in-right me-1"></i> Sign in</span>
        </button>
      </form>

      <hr class="my-4"/>
      <div class="text-center small text-muted">
        Don't have an account? <a href="register.html" class="text-decoration-none">Register</a>
      </div>
      <div class="text-center small text-muted mt-3" style="font-size:.75rem;">
        Default admin: <code>admin@society.local</code> / <code>Admin@12345</code>
      </div>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = 'dashboard.html';

    function togglePw() {
      const inp = document.querySelector('input[name=password]');
      const eye = document.getElementById('pwEye');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      eye.className = inp.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.currentTarget;
      const email = form.email.value.trim();
      const password = form.password.value;
      const alert = document.getElementById('alert');
      const btn = document.getElementById('submitBtn');
      alert.classList.add('d-none');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in…';
      try {
        const res = await API.login(email, password);
        Auth.save(res);
        window.location.href = 'dashboard.html';
      } catch (err) {
        alert.textContent = err.message || 'Invalid email or password';
        alert.classList.remove('d-none');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-1"></i> Sign in';
      }
    });
  </script>
</body>
</html>
