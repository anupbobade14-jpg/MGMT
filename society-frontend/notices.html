<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Notice Board — Society Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="assets/css/app.css" rel="stylesheet"/>
</head>
<body>
<div class="sm-app">
  <aside id="sm-sidebar" class="sm-sidebar"></aside>
  <main class="sm-main">
    <div id="sm-topbar" class="sm-topbar"></div>

    <div class="d-flex justify-content-between mb-3">
      <h5 class="mb-0"><i class="bi bi-megaphone-fill text-primary"></i> Notice Board</h5>
      <button id="btnNewNotice" class="btn btn-primary btn-sm d-none"><i class="bi bi-plus-lg me-1"></i> New Notice</button>
    </div>
    <div id="noticeList" class="row g-3"></div>

    <h5 class="section-title mt-4"><i class="bi bi-calendar-event-fill text-primary"></i> Events</h5>
    <div id="eventList" class="row g-3"></div>
  </main>
</div>

<!-- New notice modal -->
<div class="modal fade" id="noticeModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="noticeForm">
        <div class="modal-header"><h5 class="modal-title">New Notice</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div class="mb-2"><label class="form-label small">Title</label><input name="title" class="form-control" required/></div>
          <div class="mb-2"><label class="form-label small">Category</label>
            <select name="category" class="form-select">
              <option>GENERAL</option><option>MEETING</option><option>EMERGENCY</option><option>EVENT</option>
            </select></div>
          <div class="mb-2"><label class="form-label small">Body</label><textarea name="body" class="form-control" rows="5" required></textarea></div>
          <div class="form-check"><input class="form-check-input" name="pinned" type="checkbox" id="pinChk"><label for="pinChk" class="form-check-label small">Pin to top</label></div>
        </div>
        <div class="modal-footer"><button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary" type="submit">Publish</button></div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/app.js"></script>
<script>
Auth.requireLogin();
renderLayout('notices', 'Notice Board');
const canPost = Auth.hasRole('SUPER_ADMIN','SOCIETY_ADMIN','COMMITTEE');
if (canPost) document.getElementById('btnNewNotice').classList.remove('d-none');

async function loadAll() {
  showSpinner(true);
  try {
    const [notices, events] = await Promise.all([API.notices(), API.events()]);
    document.getElementById('noticeList').innerHTML = notices.length ? notices.map(n => `
      <div class="col-md-6">
        <div class="card p-3 hover-shadow h-100">
          <div class="d-flex justify-content-between align-items-start mb-1">
            <span class="badge bg-primary-subtle text-primary">${n.category}</span>
            ${n.pinned ? '<i class="bi bi-pin-angle-fill text-warning" title="Pinned"></i>' : ''}
          </div>
          <h6 class="mt-1">${escapeHtml(n.title)}</h6>
          <p class="text-muted small mb-2" style="white-space:pre-wrap;">${escapeHtml(n.body)}</p>
          <div class="mt-auto small text-muted">${fmt.dateTime(n.publishedAt)}</div>
        </div>
      </div>
    `).join('') : '<div class="col-12"><div class="text-muted p-4 text-center">No notices published yet.</div></div>';

    document.getElementById('eventList').innerHTML = events.length ? events.map(ev => `
      <div class="col-md-4">
        <div class="card p-3 h-100 hover-shadow">
          <div class="d-flex gap-2 align-items-center mb-2">
            <div class="rounded p-2" style="background:#eef2ff;color:#1e3a8a;"><i class="bi bi-calendar-event"></i></div>
            <div>
              <div style="font-weight:600;">${escapeHtml(ev.title)}</div>
              <div class="small text-muted">${fmt.dateTime(ev.eventDate)}</div>
            </div>
          </div>
          <p class="small text-muted mb-1">${escapeHtml(ev.description || '')}</p>
          <div class="small"><i class="bi bi-geo-alt"></i> ${escapeHtml(ev.location || '—')}</div>
        </div>
      </div>
    `).join('') : '<div class="col-12"><div class="text-muted p-4 text-center">No upcoming events.</div></div>';

  } finally { showSpinner(false); }
}

document.getElementById('btnNewNotice')?.addEventListener('click', () => new bootstrap.Modal(document.getElementById('noticeModal')).show());
document.getElementById('noticeForm').addEventListener('submit', async e => {
  e.preventDefault();
  const fd = new FormData(e.currentTarget);
  const payload = { title: fd.get('title'), body: fd.get('body'), category: fd.get('category'), pinned: fd.get('pinned') === 'on' };
  showSpinner(true);
  try {
    await API.createNotice(payload);
    bootstrap.Modal.getInstance(document.getElementById('noticeModal')).hide();
    showToast('Notice published', 'success');
    loadAll();
  } catch (err) { showToast(err.message, 'danger'); }
  finally { showSpinner(false); }
});

function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
loadAll();
</script>
</body>
</html>
