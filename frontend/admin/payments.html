<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Payment Approvals — Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="../assets/css/app.css" rel="stylesheet"/>
</head>
<body>
<div class="sm-app">
  <aside id="sm-sidebar" class="sm-sidebar"></aside>
  <main class="sm-main">
    <div id="sm-topbar" class="sm-topbar"></div>

    <div class="d-flex justify-content-between mb-3">
      <ul class="nav nav-pills">
        <li class="nav-item"><a class="nav-link active" data-status="UNDER_VERIFICATION">Pending Review</a></li>
        <li class="nav-item"><a class="nav-link" data-status="APPROVED">Approved</a></li>
        <li class="nav-item"><a class="nav-link" data-status="REJECTED">Rejected</a></li>
        <li class="nav-item"><a class="nav-link" data-status="">All</a></li>
      </ul>
      <button class="btn btn-primary btn-sm" id="btnGenerate"><i class="bi bi-lightning-fill me-1"></i> Generate Monthly Bills</button>
    </div>

    <div class="card">
      <div class="table-responsive">
        <table class="table align-middle mb-0">
          <thead><tr><th>Date</th><th>Owner/Flat</th><th>Period</th><th>Amount</th><th>Mode</th><th>Ref</th><th>Proof</th><th>Status</th><th class="text-end">Actions</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal fade" id="mProof"><div class="modal-dialog modal-lg"><div class="modal-content">
  <div class="modal-header"><h5>Payment Proof</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
  <div class="modal-body text-center"><img id="proofImg" style="max-width:100%; max-height:70vh"/></div>
</div></div></div>

<div class="modal fade" id="mGen"><div class="modal-dialog"><div class="modal-content"><form id="fGen">
  <div class="modal-header"><h5>Generate Monthly Bills</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
  <div class="modal-body">
    <div class="row g-2">
      <div class="col-md-6"><label class="form-label small">Month</label><input type="number" name="month" min="1" max="12" class="form-control" required/></div>
      <div class="col-md-6"><label class="form-label small">Year</label><input type="number" name="year" min="2024" max="2035" class="form-control" required/></div>
      <div class="col-md-6"><label class="form-label small">Override amount (optional)</label><input type="number" step="0.01" name="overrideAmount" class="form-control" placeholder="e.g. 2500"/></div>
      <div class="col-md-6"><label class="form-label small">Due date</label><input type="date" name="dueDate" class="form-control"/></div>
    </div>
    <div class="alert alert-info small mt-3 mb-0">Bills will be generated for all <strong>occupied</strong> flats and owners emailed automatically.</div>
  </div>
  <div class="modal-footer"><button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary">Generate</button></div>
</form></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/app.js"></script>
<script>
Auth.requireRole(['SUPER_ADMIN','SOCIETY_ADMIN','ACCOUNTANT'], '../dashboard.html');
renderLayout('admin-payments', 'Payment Approvals');
let currentStatus = 'UNDER_VERIFICATION';

document.querySelectorAll('.nav-pills a').forEach(a => a.addEventListener('click', e => {
  e.preventDefault();
  document.querySelectorAll('.nav-pills a').forEach(x => x.classList.remove('active'));
  a.classList.add('active');
  currentStatus = a.dataset.status; load();
}));

async function load() {
  showSpinner(true);
  try {
    const page = await API.paymentsList(currentStatus);
    const rows = page.content || page;
    const tbody = document.getElementById('tbody');
    if (!rows.length) { tbody.innerHTML = '<tr><td colspan="9" class="text-muted text-center py-4">No payments.</td></tr>'; return; }
    tbody.innerHTML = rows.map(p => {
      const b = p.maintenance || {};
      const o = p.owner || {};
      return `<tr>
        <td class="small">${fmt.date(p.paymentDate)}</td>
        <td><strong>${escape(o.fullName || '-')}</strong><div class="small text-muted">${b.flat?.flatNumber || ''}</div></td>
        <td>${b.billMonth ? fmt.monthYear(b.billMonth, b.billYear) : '-'}</td>
        <td>${fmt.money(p.amount)}</td>
        <td>${p.paymentMode}</td>
        <td class="small"><code>${escape(p.transactionRef || '-')}</code></td>
        <td>${p.proofFilePath ? `<button class="btn btn-sm btn-outline-secondary" onclick="viewProof(${p.id})"><i class="bi bi-image"></i></button>` : '—'}</td>
        <td><span class="badge-status ${p.status.toLowerCase()}">${p.status.replace('_',' ')}</span>
            ${p.receiptNumber ? `<div class="small text-muted mt-1">#${p.receiptNumber}</div>` : ''}</td>
        <td class="text-end">
          ${p.status === 'UNDER_VERIFICATION'
            ? `<button class="btn btn-sm btn-success me-1" onclick="reviewP(${p.id}, true)"><i class="bi bi-check2"></i> Approve</button>
               <button class="btn btn-sm btn-outline-danger" onclick="reviewP(${p.id}, false)"><i class="bi bi-x"></i> Reject</button>`
            : (p.status === 'APPROVED' && p.receiptFilePath)
              ? `<a class="btn btn-sm btn-outline-primary" href="${API.receiptUrl(p.id)}" target="_blank"><i class="bi bi-download"></i> Receipt</a>`
              : '<span class="text-muted small">—</span>'}
        </td></tr>`;
    }).join('');
  } catch (e) { showToast(e.message, 'danger'); }
  finally { showSpinner(false); }
}

async function viewProof(id) {
  const img = document.getElementById('proofImg');
  const res = await fetch(API.proofUrl(id), { headers:{ Authorization:'Bearer '+Auth.token() }});
  if (!res.ok) return showToast('Cannot load proof', 'danger');
  const blob = await res.blob();
  img.src = URL.createObjectURL(blob);
  new bootstrap.Modal(document.getElementById('mProof')).show();
}
window.viewProof = viewProof;

async function reviewP(id, approve) {
  const notes = approve ? '' : (prompt('Reason for rejection?') || 'Invalid proof');
  if (!approve && !notes) return;
  showSpinner(true);
  try {
    await API.reviewPayment(id, approve, notes);
    showToast(approve ? 'Payment approved. Receipt generated.' : 'Payment rejected.', approve ? 'success' : 'warning');
    load();
  } catch (e) { showToast(e.message, 'danger'); }
  finally { showSpinner(false); }
}
window.reviewP = reviewP;

document.getElementById('btnGenerate').onclick = () => {
  const d = new Date();
  document.querySelector('#fGen [name=month]').value = d.getMonth() + 1;
  document.querySelector('#fGen [name=year]').value  = d.getFullYear();
  new bootstrap.Modal(document.getElementById('mGen')).show();
};
document.getElementById('fGen').onsubmit = async e => {
  e.preventDefault();
  const d = Object.fromEntries(new FormData(e.currentTarget));
  d.month = Number(d.month); d.year = Number(d.year);
  if (d.overrideAmount) d.overrideAmount = Number(d.overrideAmount); else delete d.overrideAmount;
  if (!d.dueDate) delete d.dueDate;
  showSpinner(true);
  try {
    const r = await API.generateMaintenance(d);
    showToast(`Generated ${r.created} bills`, 'success');
    bootstrap.Modal.getInstance(document.getElementById('mGen')).hide();
    load();
  } catch (err) { showToast(err.message, 'danger'); }
  finally { showSpinner(false); }
};
function escape(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
load();
</script>
</body>
</html>
