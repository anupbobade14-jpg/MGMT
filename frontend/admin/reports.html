<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Reports — Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="../assets/css/app.css" rel="stylesheet"/>
</head>
<body>
<div class="sm-app">
  <aside id="sm-sidebar" class="sm-sidebar"></aside>
  <main class="sm-main">
    <div id="sm-topbar" class="sm-topbar"></div>

    <div class="row g-3">
      <div class="col-md-6 col-lg-4">
        <div class="card p-3 h-100 hover-shadow">
          <h6><i class="bi bi-file-earmark-text text-primary"></i> Owner Ledger</h6>
          <p class="small text-muted">Complete maintenance history for a specific owner.</p>
          <div class="input-group input-group-sm">
            <select id="ownerSel" class="form-select"><option>Loading...</option></select>
            <button class="btn btn-primary" onclick="loadLedger()">View</button>
          </div>
        </div>
      </div>
      <div class="col-md-6 col-lg-4">
        <div class="card p-3 h-100 hover-shadow">
          <h6><i class="bi bi-exclamation-triangle text-warning"></i> Pending Report</h6>
          <p class="small text-muted">All bills currently pending or overdue.</p>
          <button class="btn btn-outline-primary btn-sm w-100" onclick="loadPending()">View Pending</button>
        </div>
      </div>
      <div class="col-md-6 col-lg-4">
        <div class="card p-3 h-100 hover-shadow">
          <h6><i class="bi bi-check2-circle text-success"></i> Collection Report</h6>
          <p class="small text-muted">Full paid bills history + CSV export.</p>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-primary btn-sm flex-grow-1" onclick="loadCollection()">View</button>
            <a class="btn btn-outline-secondary btn-sm" href="#" id="csvBtn"><i class="bi bi-download"></i> CSV</a>
          </div>
        </div>
      </div>
    </div>

    <div class="card p-3 mt-3" id="resultCard" style="display:none">
      <div class="d-flex justify-content-between mb-2">
        <h6 id="resultTitle"></h6>
        <span class="small text-muted" id="resultCount"></span>
      </div>
      <div id="resultBody"></div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/app.js"></script>
<script>
Auth.requireRole(['SUPER_ADMIN','SOCIETY_ADMIN','ACCOUNTANT','COMMITTEE'], '../dashboard.html');
renderLayout('admin-reports', 'Reports');

// Attach token to CSV download via a small trick
document.getElementById('csvBtn').addEventListener('click', async e => {
  e.preventDefault();
  showSpinner(true);
  try {
    const res = await fetch(API.collectionCsvUrl(), { headers: { Authorization:'Bearer '+Auth.token() }});
    if (!res.ok) throw new Error('Download failed');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'collection.csv'; a.click();
  } catch (err) { showToast(err.message, 'danger'); }
  finally { showSpinner(false); }
});

(async () => {
  try {
    const owners = await API.owners();
    document.getElementById('ownerSel').innerHTML = owners.map(o => `<option value="${o.id}">${escape(o.fullName)} — ${o.flat?.flatNumber||''}</option>`).join('') || '<option>No owners</option>';
  } catch (e) {}
})();

function show(title, count, html) {
  document.getElementById('resultCard').style.display = '';
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultCount').textContent = count + ' rows';
  document.getElementById('resultBody').innerHTML = html;
}

async function loadLedger() {
  const id = document.getElementById('ownerSel').value;
  showSpinner(true);
  try {
    const r = await API.ownerLedger(id);
    const bills = r.bills || [];
    const html = `<div class="alert alert-primary bg-primary-soft border-0">${escape(r.owner.name)} — Flat ${escape(r.owner.flat)}</div>
      <div class="table-responsive"><table class="table"><thead><tr><th>Period</th><th>Amount</th><th>Due</th><th>Status</th></tr></thead>
      <tbody>${bills.map(b=>`<tr><td>${fmt.monthYear(b.billMonth,b.billYear)}</td><td>${fmt.money(b.totalAmount)}</td><td>${fmt.date(b.dueDate)}</td><td><span class="badge-status ${b.status.toLowerCase()}">${b.status.replace('_',' ')}</span></td></tr>`).join('') || '<tr><td colspan="4" class="text-muted text-center">No bills</td></tr>'}</tbody></table></div>`;
    show('Owner Ledger', bills.length, html);
  } catch (e) { showToast(e.message,'danger'); }
  finally { showSpinner(false); }
}
async function loadPending() {
  showSpinner(true);
  try {
    const rows = await API.pendingReport();
    const html = `<div class="table-responsive"><table class="table"><thead><tr><th>Flat</th><th>Owner</th><th>Period</th><th>Amount</th><th>Due</th><th>Status</th></tr></thead>
      <tbody>${rows.map(b=>`<tr><td>${b.flat?.flatNumber||''}</td><td>${escape(b.owner?.fullName||'-')}</td><td>${fmt.monthYear(b.billMonth,b.billYear)}</td><td>${fmt.money(b.totalAmount)}</td><td>${fmt.date(b.dueDate)}</td><td><span class="badge-status ${b.status.toLowerCase()}">${b.status.replace('_',' ')}</span></td></tr>`).join('') || '<tr><td colspan="6" class="text-muted text-center">No pending bills</td></tr>'}</tbody></table></div>`;
    show('Pending Bills Report', rows.length, html);
  } catch (e) { showToast(e.message,'danger'); }
  finally { showSpinner(false); }
}
async function loadCollection() {
  showSpinner(true);
  try {
    const rows = await API.collectionReport();
    const html = `<div class="table-responsive"><table class="table"><thead><tr><th>Flat</th><th>Owner</th><th>Period</th><th>Amount</th></tr></thead>
      <tbody>${rows.map(b=>`<tr><td>${b.flat?.flatNumber||''}</td><td>${escape(b.owner?.fullName||'-')}</td><td>${fmt.monthYear(b.billMonth,b.billYear)}</td><td class="text-success fw-semibold">${fmt.money(b.totalAmount)}</td></tr>`).join('') || '<tr><td colspan="4" class="text-muted text-center">No collections</td></tr>'}</tbody></table></div>`;
    show('Collection Report', rows.length, html);
  } catch (e) { showToast(e.message,'danger'); }
  finally { showSpinner(false); }
}
window.loadLedger = loadLedger; window.loadPending = loadPending; window.loadCollection = loadCollection;
function escape(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
</script>
</body>
</html>
