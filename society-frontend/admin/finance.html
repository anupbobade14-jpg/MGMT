<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Finance — Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="../assets/css/app.css" rel="stylesheet"/>
</head>
<body>
<div class="sm-app">
  <aside id="sm-sidebar" class="sm-sidebar"></aside>
  <main class="sm-main">
    <div id="sm-topbar" class="sm-topbar"></div>

    <div class="card p-3 mb-3">
      <div class="row g-2 align-items-end">
        <div class="col-md-3"><label class="form-label small">From</label><input type="date" id="fromD" class="form-control form-control-sm"/></div>
        <div class="col-md-3"><label class="form-label small">To</label><input type="date" id="toD" class="form-control form-control-sm"/></div>
        <div class="col-md-2"><button class="btn btn-primary btn-sm w-100" id="btnApply"><i class="bi bi-arrow-clockwise me-1"></i> Refresh</button></div>
      </div>
    </div>

    <div class="row g-3 mb-3" id="summary"></div>

    <ul class="nav nav-tabs mb-3">
      <li class="nav-item"><a class="nav-link active" data-tab="expenses">Expenses</a></li>
      <li class="nav-item"><a class="nav-link" data-tab="incomes">Other Income</a></li>
    </ul>

    <div id="tab-expenses">
      <div class="d-flex justify-content-between mb-2">
        <h6 class="mb-0">Expenses</h6>
        <button class="btn btn-sm btn-primary" id="btnNewExp"><i class="bi bi-plus-lg"></i> Add Expense</button>
      </div>
      <div class="card"><div class="table-responsive"><table class="table mb-0"><thead><tr><th>Date</th><th>Category</th><th>Vendor</th><th>Description</th><th>Amount</th></tr></thead><tbody id="tbExp"></tbody></table></div></div>
    </div>

    <div id="tab-incomes" style="display:none">
      <div class="d-flex justify-content-between mb-2">
        <h6 class="mb-0">Other Income</h6>
        <button class="btn btn-sm btn-primary" id="btnNewInc"><i class="bi bi-plus-lg"></i> Add Income</button>
      </div>
      <div class="card"><div class="table-responsive"><table class="table mb-0"><thead><tr><th>Date</th><th>Category</th><th>Description</th><th>Amount</th></tr></thead><tbody id="tbInc"></tbody></table></div></div>
    </div>
  </main>
</div>

<!-- Modals -->
<div class="modal fade" id="mExp"><div class="modal-dialog"><div class="modal-content"><form id="fExp">
  <div class="modal-header"><h5>Add Expense</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
  <div class="modal-body">
    <div class="row g-2">
      <div class="col-md-6"><label class="form-label small">Category</label><select name="categoryId" class="form-select" required></select></div>
      <div class="col-md-6"><label class="form-label small">Date</label><input type="date" name="expenseDate" class="form-control" required/></div>
      <div class="col-md-6"><label class="form-label small">Amount</label><input type="number" step="0.01" name="amount" class="form-control" required/></div>
      <div class="col-md-6"><label class="form-label small">Vendor</label><input name="vendor" class="form-control"/></div>
      <div class="col-md-12"><label class="form-label small">Description</label><input name="description" class="form-control"/></div>
      <div class="col-md-6"><label class="form-label small">Invoice #</label><input name="invoiceNo" class="form-control"/></div>
      <div class="col-md-6"><label class="form-label small">Payment mode</label><input name="paymentMode" class="form-control" placeholder="CASH/UPI/…"/></div>
    </div>
  </div><div class="modal-footer"><button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary">Save</button></div>
</form></div></div></div>

<div class="modal fade" id="mInc"><div class="modal-dialog"><div class="modal-content"><form id="fInc">
  <div class="modal-header"><h5>Add Income</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
  <div class="modal-body">
    <div class="row g-2">
      <div class="col-md-6"><label class="form-label small">Category</label><select name="categoryId" class="form-select" required></select></div>
      <div class="col-md-6"><label class="form-label small">Date</label><input type="date" name="incomeDate" class="form-control" required/></div>
      <div class="col-md-6"><label class="form-label small">Amount</label><input type="number" step="0.01" name="amount" class="form-control" required/></div>
      <div class="col-md-6"><label class="form-label small">Reference</label><input name="referenceNo" class="form-control"/></div>
      <div class="col-md-12"><label class="form-label small">Description</label><input name="description" class="form-control"/></div>
    </div>
  </div><div class="modal-footer"><button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary">Save</button></div>
</form></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/app.js"></script>
<script>
Auth.requireRole(['SUPER_ADMIN','SOCIETY_ADMIN','ACCOUNTANT'], '../dashboard.html');
renderLayout('admin-finance', 'Finance');

const today = new Date();
const first = new Date(today.getFullYear(), today.getMonth(), 1);
document.getElementById('fromD').value = first.toISOString().slice(0,10);
document.getElementById('toD').value   = today.toISOString().slice(0,10);

document.querySelectorAll('.nav-tabs a').forEach(a => a.addEventListener('click', e => {
  e.preventDefault();
  document.querySelectorAll('.nav-tabs a').forEach(x => x.classList.remove('active'));
  a.classList.add('active');
  ['expenses','incomes'].forEach(t => document.getElementById('tab-'+t).style.display = a.dataset.tab===t ? '' : 'none');
}));

async function refresh() {
  const from = document.getElementById('fromD').value, to = document.getElementById('toD').value;
  showSpinner(true);
  try {
    const [sum, exps, incs, expCats, incCats] = await Promise.all([
      API.financeSummary(from, to), API.expenses(from, to), API.incomes(from, to), API.expenseCats(), API.incomeCats()
    ]);
    // Summary cards
    document.getElementById('summary').innerHTML = [
      { cls:'indigo', icon:'wallet-fill',      label:'Maintenance Collection', value: fmt.money(sum.maintenanceCollection) },
      { cls:'sky',    icon:'plus-circle-fill', label:'Other Income',           value: fmt.money(sum.otherIncome) },
      { cls:'green',  icon:'graph-up',         label:'Total Income',           value: fmt.money(sum.totalIncome) },
      { cls:'rose',   icon:'dash-circle-fill', label:'Total Expenses',         value: fmt.money(sum.totalExpenses) },
      { cls:'amber',  icon:'piggy-bank-fill',  label:'Net Balance',            value: fmt.money(sum.netBalance) },
    ].map(c => `
      <div class="col-md">
        <div class="stat-card ${c.cls} hover-shadow">
          <div class="icon"><i class="bi bi-${c.icon}"></i></div>
          <div class="label">${c.label}</div>
          <div class="value" style="font-size:1.3rem">${c.value}</div>
        </div>
      </div>`).join('');

    document.getElementById('tbExp').innerHTML = exps.map(x => `
      <tr><td class="small">${fmt.date(x.expenseDate)}</td><td>${escape(x.category?.name||'-')}</td>
      <td>${escape(x.vendor||'')}</td><td>${escape(x.description||'')}</td><td class="text-danger fw-semibold">${fmt.money(x.amount)}</td></tr>
    `).join('') || '<tr><td colspan="5" class="text-muted text-center py-3">No expenses.</td></tr>';

    document.getElementById('tbInc').innerHTML = incs.map(x => `
      <tr><td class="small">${fmt.date(x.incomeDate)}</td><td>${escape(x.category?.name||'-')}</td>
      <td>${escape(x.description||'')}</td><td class="text-success fw-semibold">${fmt.money(x.amount)}</td></tr>
    `).join('') || '<tr><td colspan="4" class="text-muted text-center py-3">No income entries.</td></tr>';

    document.querySelector('#fExp select[name=categoryId]').innerHTML = expCats.map(c => `<option value="${c.id}">${escape(c.name)}</option>`).join('');
    document.querySelector('#fInc select[name=categoryId]').innerHTML = incCats.map(c => `<option value="${c.id}">${escape(c.name)}</option>`).join('');
  } catch (e) { showToast(e.message, 'danger'); }
  finally { showSpinner(false); }
}

document.getElementById('btnApply').onclick = refresh;

document.getElementById('btnNewExp').onclick = () => {
  document.querySelector('#fExp [name=expenseDate]').value = new Date().toISOString().slice(0,10);
  new bootstrap.Modal(document.getElementById('mExp')).show();
};
document.getElementById('btnNewInc').onclick = () => {
  document.querySelector('#fInc [name=incomeDate]').value = new Date().toISOString().slice(0,10);
  new bootstrap.Modal(document.getElementById('mInc')).show();
};
document.getElementById('fExp').onsubmit = async e => {
  e.preventDefault(); const d = Object.fromEntries(new FormData(e.currentTarget));
  d.amount = Number(d.amount); d.categoryId = Number(d.categoryId);
  try { await API.addExpense(d); showToast('Saved','success'); bootstrap.Modal.getInstance(document.getElementById('mExp')).hide(); refresh(); }
  catch(err){showToast(err.message,'danger');}
};
document.getElementById('fInc').onsubmit = async e => {
  e.preventDefault(); const d = Object.fromEntries(new FormData(e.currentTarget));
  d.amount = Number(d.amount);
  const catId = Number(d.categoryId); delete d.categoryId;
  d.category = { id: catId };
  try { await API.addIncome(d); showToast('Saved','success'); bootstrap.Modal.getInstance(document.getElementById('mInc')).hide(); refresh(); }
  catch(err){showToast(err.message,'danger');}
};
function escape(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
refresh();
</script>
</body>
</html>
