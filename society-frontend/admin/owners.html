<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Owners & Flats — Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="../assets/css/app.css" rel="stylesheet"/>
</head>
<body>
<div class="sm-app">
  <aside id="sm-sidebar" class="sm-sidebar"></aside>
  <main class="sm-main">
    <div id="sm-topbar" class="sm-topbar"></div>

    <ul class="nav nav-tabs mb-3">
      <li class="nav-item"><a class="nav-link active" data-tab="owners">Owners</a></li>
      <li class="nav-item"><a class="nav-link" data-tab="flats">Flats</a></li>
      <li class="nav-item"><a class="nav-link" data-tab="buildings">Buildings</a></li>
    </ul>

    <div id="tab-owners">
      <div class="d-flex justify-content-between mb-3">
        <h5><i class="bi bi-people-fill text-primary"></i> Owners</h5>
        <button class="btn btn-primary btn-sm" id="btnNewOwner"><i class="bi bi-plus-lg"></i> Add Owner</button>
      </div>
      <div class="card"><div class="table-responsive"><table class="table mb-0"><thead><tr><th>Name</th><th>Flat</th><th>Email</th><th>Phone</th><th>Move-in</th><th></th></tr></thead><tbody id="tbOwners"></tbody></table></div></div>
    </div>

    <div id="tab-flats" style="display:none">
      <div class="d-flex justify-content-between mb-3">
        <h5><i class="bi bi-house-fill text-primary"></i> Flats</h5>
        <button class="btn btn-primary btn-sm" id="btnNewFlat"><i class="bi bi-plus-lg"></i> Add Flat</button>
      </div>
      <div class="card"><div class="table-responsive"><table class="table mb-0"><thead><tr><th>Building</th><th>Flat #</th><th>Floor</th><th>BHK</th><th>Occupancy</th><th>Monthly Maintenance</th></tr></thead><tbody id="tbFlats"></tbody></table></div></div>
    </div>

    <div id="tab-buildings" style="display:none">
      <div class="d-flex justify-content-between mb-3">
        <h5><i class="bi bi-building text-primary"></i> Buildings</h5>
        <button class="btn btn-primary btn-sm" id="btnNewBuilding"><i class="bi bi-plus-lg"></i> Add Building</button>
      </div>
      <div class="card"><div class="table-responsive"><table class="table mb-0"><thead><tr><th>Name</th><th>Wing</th><th>Address</th><th>Floors</th></tr></thead><tbody id="tbBuildings"></tbody></table></div></div>
    </div>
  </main>
</div>

<!-- Modals -->
<div class="modal fade" id="mOwner"><div class="modal-dialog"><div class="modal-content"><form id="fOwner">
  <div class="modal-header"><h5>Add Owner</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
  <div class="modal-body">
    <div class="row g-2">
      <div class="col-md-6"><label class="form-label small">Full name</label><input name="fullName" class="form-control" required/></div>
      <div class="col-md-6"><label class="form-label small">Phone</label><input name="phone" class="form-control"/></div>
      <div class="col-md-6"><label class="form-label small">Email</label><input type="email" name="email" class="form-control"/></div>
      <div class="col-md-6"><label class="form-label small">Emergency Contact</label><input name="emergencyContact" class="form-control"/></div>
      <div class="col-md-6"><label class="form-label small">Flat</label><select name="flatId" class="form-select" required></select></div>
      <div class="col-md-6"><label class="form-label small">Move-in date</label><input type="date" name="moveInDate" class="form-control"/></div>
    </div>
  </div><div class="modal-footer"><button class="btn btn-light" type="button" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary">Save</button></div>
</form></div></div></div>

<div class="modal fade" id="mFlat"><div class="modal-dialog"><div class="modal-content"><form id="fFlat">
  <div class="modal-header"><h5>Add Flat</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
  <div class="modal-body">
    <div class="row g-2">
      <div class="col-md-6"><label class="form-label small">Building</label><select name="buildingId" class="form-select" required></select></div>
      <div class="col-md-6"><label class="form-label small">Flat #</label><input name="flatNumber" class="form-control" required/></div>
      <div class="col-md-4"><label class="form-label small">Floor</label><input type="number" name="floor" class="form-control"/></div>
      <div class="col-md-4"><label class="form-label small">BHK</label><input name="bhk" class="form-control" placeholder="2BHK"/></div>
      <div class="col-md-4"><label class="form-label small">Area (sqft)</label><input type="number" step="0.01" name="areaSqft" class="form-control"/></div>
      <div class="col-md-6"><label class="form-label small">Occupancy</label><select name="occupancy" class="form-select"><option>VACANT</option><option>OCCUPIED</option><option>RENTED</option></select></div>
      <div class="col-md-6"><label class="form-label small">Monthly Maintenance</label><input type="number" step="0.01" name="monthlyMaintenance" class="form-control" value="2500"/></div>
    </div>
  </div><div class="modal-footer"><button class="btn btn-light" type="button" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary">Save</button></div>
</form></div></div></div>

<div class="modal fade" id="mBuilding"><div class="modal-dialog"><div class="modal-content"><form id="fBuilding">
  <div class="modal-header"><h5>Add Building</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
  <div class="modal-body">
    <div class="mb-2"><label class="form-label small">Name</label><input name="name" class="form-control" required/></div>
    <div class="mb-2"><label class="form-label small">Wing</label><input name="wing" class="form-control"/></div>
    <div class="mb-2"><label class="form-label small">Address</label><textarea name="address" class="form-control" rows="2"></textarea></div>
    <div class="mb-2"><label class="form-label small">Total floors</label><input type="number" name="totalFloors" class="form-control"/></div>
  </div><div class="modal-footer"><button class="btn btn-light" type="button" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary">Save</button></div>
</form></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/app.js"></script>
<script>
Auth.requireRole(['SUPER_ADMIN','SOCIETY_ADMIN','COMMITTEE'], '../dashboard.html');
renderLayout('admin-owners', 'Owners & Flats');

let buildings = [], flats = [], owners = [];

document.querySelectorAll('.nav-tabs a').forEach(a => a.addEventListener('click', e => {
  e.preventDefault();
  document.querySelectorAll('.nav-tabs a').forEach(x => x.classList.remove('active'));
  a.classList.add('active');
  ['owners','flats','buildings'].forEach(t => document.getElementById('tab-'+t).style.display = a.dataset.tab===t ? '' : 'none');
}));

async function loadAll() {
  showSpinner(true);
  try {
    buildings = await API.buildings();
    owners    = await API.owners();
    // flatten all flats
    flats = [];
    for (const b of buildings) { const fl = await API.flatsOf(b.id); flats.push(...fl.map(f => ({...f, buildingName:b.name, buildingWing:b.wing}))); }
    renderAll();
  } catch (e) { showToast(e.message, 'danger'); }
  finally { showSpinner(false); }
}
function renderAll() {
  document.getElementById('tbOwners').innerHTML = owners.map(o => `
    <tr><td><strong>${escape(o.fullName)}</strong></td><td>${o.flat?.flatNumber||''}</td><td>${o.email||''}</td><td>${o.phone||''}</td><td class="small text-muted">${fmt.date(o.moveInDate)}</td>
    <td class="text-end"><button class="btn btn-sm btn-outline-danger" onclick="delOwner(${o.id})"><i class="bi bi-trash"></i></button></td></tr>`).join('')
    || '<tr><td colspan="6" class="text-muted text-center py-3">No owners.</td></tr>';

  document.getElementById('tbFlats').innerHTML = flats.map(f => `
    <tr><td>${escape(f.buildingName)} ${f.buildingWing?'('+f.buildingWing+')':''}</td><td><strong>${f.flatNumber}</strong></td><td>${f.floor||''}</td><td>${f.bhk||''}</td>
    <td><span class="badge bg-${f.occupancy==='OCCUPIED'?'success':(f.occupancy==='RENTED'?'primary':'secondary')}-subtle text-${f.occupancy==='OCCUPIED'?'success':(f.occupancy==='RENTED'?'primary':'secondary')}">${f.occupancy}</span></td>
    <td>${fmt.money(f.monthlyMaintenance)}</td></tr>`).join('')
    || '<tr><td colspan="6" class="text-muted text-center py-3">No flats.</td></tr>';

  document.getElementById('tbBuildings').innerHTML = buildings.map(b => `
    <tr><td><strong>${escape(b.name)}</strong></td><td>${b.wing||''}</td><td>${escape(b.address||'')}</td><td>${b.totalFloors||''}</td></tr>`).join('')
    || '<tr><td colspan="4" class="text-muted text-center py-3">No buildings.</td></tr>';

  // Populate dropdowns
  const flatSel = document.querySelector('#fOwner select[name=flatId]');
  flatSel.innerHTML = flats.map(f => `<option value="${f.id}">${escape(f.buildingName)} — ${f.flatNumber}</option>`).join('');
  const bSel = document.querySelector('#fFlat select[name=buildingId]');
  bSel.innerHTML = buildings.map(b => `<option value="${b.id}">${escape(b.name)} ${b.wing?'('+b.wing+')':''}</option>`).join('');
}

document.getElementById('btnNewOwner').onclick = () => new bootstrap.Modal(document.getElementById('mOwner')).show();
document.getElementById('btnNewFlat').onclick  = () => new bootstrap.Modal(document.getElementById('mFlat')).show();
document.getElementById('btnNewBuilding').onclick = () => new bootstrap.Modal(document.getElementById('mBuilding')).show();

document.getElementById('fOwner').onsubmit = async e => {
  e.preventDefault(); const d = Object.fromEntries(new FormData(e.currentTarget));
  d.flatId = Number(d.flatId); if (!d.moveInDate) delete d.moveInDate;
  try { await API.createOwner(d); showToast('Owner added','success'); bootstrap.Modal.getInstance(document.getElementById('mOwner')).hide(); e.currentTarget.reset(); loadAll(); }
  catch(err){showToast(err.message,'danger');}
};
document.getElementById('fFlat').onsubmit = async e => {
  e.preventDefault(); const d = Object.fromEntries(new FormData(e.currentTarget));
  d.buildingId = Number(d.buildingId); if(d.floor) d.floor=Number(d.floor); if(d.areaSqft) d.areaSqft=Number(d.areaSqft); if(d.monthlyMaintenance) d.monthlyMaintenance=Number(d.monthlyMaintenance);
  try { await API.createFlat(d); showToast('Flat added','success'); bootstrap.Modal.getInstance(document.getElementById('mFlat')).hide(); e.currentTarget.reset(); loadAll(); }
  catch(err){showToast(err.message,'danger');}
};
document.getElementById('fBuilding').onsubmit = async e => {
  e.preventDefault(); const d = Object.fromEntries(new FormData(e.currentTarget));
  if(d.totalFloors) d.totalFloors = Number(d.totalFloors);
  try { await API.createBuilding(d); showToast('Building added','success'); bootstrap.Modal.getInstance(document.getElementById('mBuilding')).hide(); e.currentTarget.reset(); loadAll(); }
  catch(err){showToast(err.message,'danger');}
};
async function delOwner(id){ if(!confirm('Delete this owner?')) return;
  try { await API.deleteOwner(id); showToast('Deleted','success'); loadAll(); } catch(e){showToast(e.message,'danger');}
}
window.delOwner = delOwner;
function escape(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
loadAll();
</script>
</body>
</html>
