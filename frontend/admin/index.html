<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin — Society Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="../assets/css/app.css" rel="stylesheet"/>
</head>
<body>
<div class="sm-app">
  <aside id="sm-sidebar" class="sm-sidebar"></aside>
  <main class="sm-main">
    <div id="sm-topbar" class="sm-topbar"></div>

    <div class="row g-3" id="statCards"></div>

    <div class="row g-3 mt-1">
      <div class="col-lg-8">
        <div class="card p-3">
          <h5 class="card-title mb-3"><i class="bi bi-bar-chart-fill text-primary"></i> Yearly Financial Report</h5>
          <canvas id="chartFinance" height="120"></canvas>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="card p-3 h-100">
          <h5 class="card-title mb-3"><i class="bi bi-pie-chart-fill text-primary"></i> Debit vs Credit</h5>
          <canvas id="chartPie" height="200"></canvas>
        </div>
      </div>
    </div>

    <div class="row g-3 mt-1">
      <div class="col-lg-6">
        <div class="card p-3 h-100">
          <h5 class="card-title mb-3"><i class="bi bi-clock text-primary"></i> Recent Notices</h5>
          <div id="noticeList" class="small text-muted">Loading...</div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card p-3 h-100">
          <h5 class="card-title mb-3"><i class="bi bi-calendar text-primary"></i> Upcoming Events</h5>
          <div id="eventList" class="small text-muted">Loading...</div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/app.js"></script>
<script>
Auth.requireRole(['SUPER_ADMIN','SOCIETY_ADMIN','ACCOUNTANT','COMMITTEE'], '../dashboard.html');
renderLayout('admin', 'Admin Dashboard');

(async () => {
  showSpinner(true);
  try {
    const d = await API.dashboard();
    const stats = [
      { cls:'indigo', icon:'building',   label:'Total Flats',     value: fmt.int(d.totalFlats) },
      { cls:'green',  icon:'house-check',label:'Occupied',        value: fmt.int(d.occupiedFlats) },
      { cls:'amber',  icon:'exclamation-circle', label:'Pending', value: fmt.int(d.pendingMaintenance) },
      { cls:'green',  icon:'check2-all', label:'Paid Bills',      value: fmt.int(d.paidMaintenance) },
      { cls:'indigo', icon:'wallet-fill',label:'This Month Coll.', value: fmt.money(d.monthlyCollection) },
      { cls:'rose',   icon:'graph-down-arrow', label:'Expenses YTD', value: fmt.money(d.totalExpenses) },
      { cls:'sky',    icon:'cash-stack', label:"Today's Coll.",  value: fmt.money(d.todaysCollection) },
      { cls:'green',  icon:'piggy-bank-fill', label:'Balance',    value: fmt.money(d.availableBalance) },
    ];
    document.getElementById('statCards').innerHTML = stats.map(s => `
      <div class="col-lg-3 col-md-6">
        <div class="stat-card ${s.cls} hover-shadow">
          <div class="icon"><i class="bi bi-${s.icon}"></i></div>
          <div class="label">${s.label}</div>
          <div class="value">${s.value}</div>
        </div>
      </div>`).join('');

    const labels = Object.keys(d.monthlyCollectionChart).map(m=>m.substring(0,3));
    const coll = Object.values(d.monthlyCollectionChart).map(Number);
    const exp = Object.values(d.monthlyExpenseChart).map(Number);
    new Chart(document.getElementById('chartFinance'), {
      type:'line',
      data:{labels, datasets:[
        {label:'Income',   data:coll, borderColor:'#1e3a8a', backgroundColor:'rgba(30,58,138,.15)', tension:.35, fill:true, borderWidth:2},
        {label:'Expenses', data:exp,  borderColor:'#f59e0b', backgroundColor:'rgba(245,158,11,.15)', tension:.35, fill:true, borderWidth:2}
      ]},
      options:{plugins:{legend:{position:'bottom'}}, scales:{y:{beginAtZero:true}}}
    });

    const totalColl = coll.reduce((a,b)=>a+b,0), totalExp = exp.reduce((a,b)=>a+b,0);
    new Chart(document.getElementById('chartPie'), {
      type:'doughnut',
      data:{labels:['Credit','Debit'], datasets:[{data:[totalColl,totalExp], backgroundColor:['#10b981','#dc2626'], borderWidth:0}]},
      options:{plugins:{legend:{position:'bottom'}}, cutout:'70%'}
    });

    document.getElementById('noticeList').innerHTML = d.recentNotices.length
      ? d.recentNotices.map(n => `<div class="border-bottom py-2"><div style="font-weight:600;">${escapeHtml(n.title)}</div><div class="text-muted small">${fmt.dateTime(n.publishedAt)}</div></div>`).join('')
      : 'No notices yet.';
    document.getElementById('eventList').innerHTML = d.upcomingEvents.length
      ? d.upcomingEvents.map(ev => `<div class="border-bottom py-2"><div style="font-weight:600;">${escapeHtml(ev.title)}</div><div class="text-muted small">${fmt.dateTime(ev.eventDate)} · ${escapeHtml(ev.location||'')}</div></div>`).join('')
      : 'No upcoming events.';
  } catch (e) { showToast(e.message, 'danger'); }
  finally { showSpinner(false); }
})();

function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
</script>
</body>
</html>
